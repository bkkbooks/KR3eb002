body:
  text: 序醫之為學自神聖工巧之外無餘説今人往往遺其三而主其一一者何切而知之謂之巧也然亦曷嘗真見其所謂巧者特竊是名以欺世耳間有以活人自任者又弊於醫書之委壓惑於議論之紛紜無所折衷每得其粗而不得其精余自弱冠有志於此常即此與舉業並攻逮夫年將知命謝絶場屋盡屏科目之纍專心醫道取靈樞素問太素甲乙難經及諸家方書脈書參考互觀求其言之明白易曉余嘗用之而驗者分門纂類裒為一集名曰察病指南其間如定四季六臟平脈與夫七表八里之主病分見於兩手三部者亦本於聖賢之遺論特推而廣之觸類而補之其他言之未甚昭著者則附以己意發明之蓋將以貽諸子孫非敢求人之知也年來疫癘盛行病者不幸而招醫多見以陽病服桂附者悉殞於非命豈惟不知脈並於證而不知籲何慘哉或者不察乃曰吾取醫之運耳奚暇問其學之精否殊不知恃運以言醫雖幸而或中而所喪亦多求其萬舉萬全者難矣此余所以不敢自私欲鋟梓以廣其傳庶幾與同志者共云淳祐改元九月立冬後四日永嘉施發政卿序序七月既望禱雨獲應翌日皂史遞詩筒來睨而視之乃峴山施君為喜雨作也語意偉健有宰官尋痛聲之句其知豫憂民之憂者歟越數日又以裒類醫書出示議論可觀非儒而醫不能也豫未嘗學醫未嘗無活人之心為邑於斯每訪民間疾苦思有以起其危日夜懍懍用藥不同而用心同其相與勉之淳祐乙巳良月冀邸趙與咨書序能醫人多矣能使人皆能醫人不多也蓋以醫醫人有限以醫教人無窮施桂堂察病證有書曰指南考本草有書曰辨異而續易簡又有方有論桂堂之心使人人知有此書此方論也不特自能醫人且欲人莫不能醫人視彔彔輩曰祕方曰家藏方小智自私靳不示人心之廣狹蓋可見淳祐丙午正月中浣淡齊趙崇賀書
