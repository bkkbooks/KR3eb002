body:
  text: 卷下審諸病生死脈法傷寒類傷寒熱盛脈浮大者生沉小者死傷寒頭痛脈洪大者可治實牢者生沉細者死傷寒已得汗脈沉小者生浮大者死傷寒咳嗽上氣脈散者死謂其形損故也溫病類溫病三四日不得汗脈細難得者死溫病瀼瀼大熱脈細小者死溫病身體溫脈洪大者可治微細者劇溫病大便不利腹中痛甚者死熱病類熱病三五日身體熱腹滿痛食飲如故脈直而疾者八日死熱病七八日氣不喘脈不數者當後三日溫汗汗不出者死熱病七八日脈微細小便黃赤口燥舌焦乾黑者死熱病已得汗脈安靜者生躁盛者氣極也必死熱病汗後脈靜者當便瘥喘熱脈亂者死熱病脈躁盛得汗者生不得汗者陽極也十死不治熱病已得汗常大熱不去者死脈必盛也熱病已得汗熱未去脈微躁者切不得針灸熱病發熱甚者其脈陰陽皆竭切勿針灸汗不出者必死水病類水病脈洪者可治微細者不可治水病腹大如鼓脈實者生虛者死水病陰閉脈浮大者生沉細虛小者死消渴類消渴脈數大者生細小浮短者死一云虛小者死消渴脈實大病久可治脈小緊急不可治人病口甘而渴此因數食甘美而多肥五氣之溢也謂之脾癉或病口苦而渴此因數謀慮不決膽氣上溢也謂之膽癉凡消癉之脈實大病久可治懸小堅病久不可治泄瀉類泄而腹脹脈弦者死腹大而泄脈微細而澀者生緊大而滑者死泄注脈緩微小者生浮大數者死注下脈細者可治浮大者劇洞泄食不化下膿血脈微小者生緊急者死下痢類下痢脈微小者生大而浮洪者生下痢膿血脈懸絕者死滑者死下痢白沫脈沉者生浮者死腸澼類痔也腸澼下白膿一云白沫脈沉者生浮者死腸澼下膿血脈沉小流連者生數疾大熱者死腸澼下膿血脈懸絕者死一云懸澀滑大者生腸澼身不熱脈不絕滑大者生弦澀者死腸澼有寒者生有熱者死腸澼筋攣脈細小安靜者生浮大堅者死咳嗽類咳嗽脈浮直者生沉堅者死咳嗽羸瘦脈堅大者死嗽脫形發熱脈緊急者死嗽而嘔脈弦欲絕者死諸嗽脈浮軟者生沉伏者死上氣類上氣脈數者死上氣浮腫脈浮滑者生微細者死上氣面浮腫肩息脈大不可治加痢必死上氣喘息低昂其脈滑手足溫者生脈澀四肢寒者死寒氣上攻脈實而順滑者生實而逆澀者死中風類中風口噤脈遲浮者生急實大數者死被風不仁痿厥脈虛者生堅者死癲狂類癲狂恍惚病脈實牢者吉沉細者凶癲疾脈大而滑者久久自已脈小緊急者死狂病妄語身微熱脈洪大者生四肢逆冷脈沉細者一日死霍亂類霍亂脈微細者生微遲氣少不言者死一云脈浮洪者生頭目類風痰頭痛脈浮大者生短澀者死頭目痛卒視無所見者死病目不見人脈澀者生浮大洪直者死閉目不欲見人脈浮短而澀者死開目而渴心下牢脈沉澀而微者死心腹類心腹痛脈沉細者生浮大弦長者死心腹痛積聚脈堅急者生虛弱者死心腹積聚其脈勁強者生沉小者死心下堅硬苦渴脈沉細者生浮大而堅者死腹腫脈浮大者生虛小者死汗類病多汗脈虛小者吉緊者凶病汗不出出而不至足者死厥逆汗出脈緊弦急者生虛緩者死血類吐血嗽而上氣脈數有熱不得臥者死吐血衄血脈滑小弱者生實大者死一云沉細者生浮大者死一雲浮大而牢者死衄血汗出脈小滑者生大躁者死唾血脈堅強者死滑者生瘀血在內腹脹脈牢大者生沉者死金瘡類金瘡出血太多脈虛細者生實大者死急疾大數者死一云血出不斷脈大而止者三七日死一云傷在陽處者去血四五斗脈微緩而遲者生急疾者死金瘡失血脈沉小者生浮大者死一雲實大而浮者死墜壓類從高頓僕內傷腸滿脈堅強者生小弱者死中毒類中毒藥脈洪大而速者吉細而但出不入並大小不齊者皆凶卒中惡毒脈大而緩者生一云堅而微細者生堅而浮者死中惡腹脹脈緊細者生浮大者死脈緊細微者生緊大而浮者死中惡吐血數升脈浮大而疾者生沉數細者死患蟲毒尺寸脈緊數而直硬者死雜病類咳而尿血脈微細者生大者死寒熱瘛瘲脈代絕者死外實內熱吐瀉脈沉細者生洪大者死內實腹脹痛乾嘔手足煩熱脈洪大實者生沉細者死陰陽俱竭齒上如熟小豆脈躁者死身熱脈浮澀者死無故而喑脈不至此氣暴厥氣復則已病人飢寒脈細氣少泄痢飲食不入是謂五虛其人必死病人漿粥入胃泄注上則肌大熱前後不通胃悶脈盛是謂五實其人必死若得身汗後利則生老人脈微陽羸陰強者生脈躁大加息者死陰羸陽強脈至而代奇日而死病甚脈洪大者易瘥脈不調者難瘥病人脈實大急數者凶左手寸口脈偏動乍大乍小從寸至關從關至尺三部之位處處動搖各異不同其人仲夏得此脈桃葉落時死脈若小急背膈偏枯年不滿二十者三歲死脈至而搏衄血身熱者死右手寸口脈偏沉伏乍大乍小朝來浮大暮即沉伏浮大則上過魚際沉伏則下不至關來往無常時伏又來者榆葉枯落時死三部脈皆澀皆滑皆緊急皆軟弱皆如張弓皆微而伏皆細而數皆累累如珠者長病人得之皆死診太衝衝陽脈太衝穴在兩足大趾本節後二寸陷中動脈是一云一寸半足厥陰之所注診此者可決男子之死生也或診太谿命門脈穴在足內踝後跟骨上動脈陷中衝陽穴一名會源即趺陽穴也在足跗上五寸骨間動脈上去陷谷三寸是即足面系鞋之所診此者以察其胃氣之有無也論病之本肝惡風諸風掉眩其本在肝心惡熱諸熱暴瘛瘡瘍血疾其本在心脾惡濕諸濕腫滿其本在脾肺惡寒諸氣膹郁其本在肺腎惡燥諸寒收引其本在腎諸厥痼泄其本在下諸痿喘嘔其本在上察雜病生死證瘧病腰脊強急瘛瘲者不可治肌瘦脫肛形熱不去者死屍厥體無所知耳內有聲如嘯汗出身溫者當自愈唇青身冷者必死內外俱虛身體冷汗出微嘔而煩擾手足厥逆體不安靜者死形羸不能服藥穀氣絕也一病才已一病復生五行勝復相乘也其人必死五臟虛實外候肝實則目赤脅疼多怒頰腫頭旋耳聾宜瀉之虛則目暗筋攣脅拘多悲恐爪甲枯不得大息宜補之心實則胸脅背臂盡痛喜笑不休口舌乾燥宜瀉之虛則少顏色驚悸憂悲舌根強腰背痛宜補之脾實則腹脹大便不利足痿不收行善瘛腳下痛身重苦飢宜瀉之虛則吐逆腹脹腸鳴飲食不化泄利無時宜補之肺實則肩背股脛皆痛喘嗽上氣宜瀉之虛則少氣咳血耳聾嗌乾宜補之腎實則腹脹體腫汗出憎風面目黧黑少氣飧泄小便黃色宜瀉之虛則䏚中冷乃脅下挾脊兩旁空軟處也脊疼耳聾厥逆無時小便色變宜鹿茸巴戟補之臟腑病外候喜寒而欲見人為腑病屬陽喜溫而不欲見人為臟病屬陰診婦人病脈生死訣婦人胞中絕傷有惡血久結成瘕其病腹痛逆滿氣上衝尺脈澀而堅為血實氣虛尺脈細而微血氣俱不足穀氣不充得節輒動棗葉生時死婦人赤白帶下脈遲滑吉數疾凶婦人新產脈緩滑者生實大弦急者死沉小者吉堅牢者凶寸口脈沉微附骨不絕者生澀疾不調者死婦人已產脈沉小實者吉浮虛者凶婦人產後熱病脈細四肢暖者生脈大四肢冷者死治蓐脈緩滑沉小細者生實大弦急堅牢者死辨胎脈脈動入產門者有胎也謂出尺脈外名曰產門尺中脈數而旺者有胎脈也一云細滑而不絕者是也一云脈微是經脈閉塞成胎也或帶數是血盛之脈有胎也左手尺脈浮洪者為男胎右手尺脈沉實者為女胎關部脈滑者為有子素問曰滑為多血少氣故有子也左手寸口脈浮大為懷男右手寸口脈沉細為懷女足太陽膀胱洪大是男孕手太陰肺脈洪大是女孕陽脈皆為男陰脈皆為女陰中見陽為男陽中見陰為女手少陰脈動甚者妊子也兩手尺部俱洪者為兩男俱沉實者為二女一云左手帶縱為兩男縱者夫乘妻也即鬼賊脈也王氏脈經云水行乘火金行乘木名曰縱也右手帶橫為雙女橫者妻乘夫也即所勝脈也謂火行乘水木行乘金名曰橫也左手脈逆為三男逆者子乘母也即己所生脈也王氏曰水行乘金火行乘木名曰逆也右手脈順為三女順者母乘子也即生己之脈也謂金行乘水木行乘火名曰順也寸關尺脈大小遲疾皆相應雙懷一男一女一云足太陽手太陰脈俱洪者一男一女脈滑而疾者三月胎候也但疾不散者五月也關上一動一止者一月二動一止者二月中衝足陽明胃脈連胞絡脈來滑疾者受孕及九旬尺脈沉細而滑或離經夜半覺痛日中則生外候胎法左乳先有核者為男右乳先有核者為女又法令娠婦面南行於背後呼之左回來者生男右回來者生女妊娠雜病生死外候血漏胞乾者殺胎亦損妊母心腸急痛面目青色冷汗自出氣欲絕者死血下不止胎衝上四肢冷悶者死舉重頓僕致胎死腹中未出而血不止衝心悶痛者死產難外候寒熱頻作舌下脈青而黑舌卷上冷子母俱死唇口俱青痰沫嘔出子母皆死面赤舌青母活子死面舌俱青痰沫頻出子活母死面青舌赤口中沫出母死子活診小兒雜病脈法凡小兒五歲以下三歲以上只看形五歲以上漸可診脈呼吸八至是常脈也九至者病十至者困許氏以大指按三部十至為發熱五至為內脹小兒脈浮而數主乳癇風熱之病小兒脈浮而數主五臟壅因乳熱或著綿衣過多如此小兒脈虛澀主驚風又浮則主風促急主虛驚小兒脈緊主風癇小兒脈緊而弦主腹痛不安小兒脈弦急主氣纏繞不和小兒脈牢而實主大腸秘小兒脈沉而數主骨中寒此數為虛虛則髓少故骨中寒小兒脈沉而細主冷小兒脈大小不等乍大乍小皆有禍祟小兒脈小或緩或沉皆主食不消化小兒變蒸之時身熱脈亂汗出不欲食乳食即吐切不可醫必自瘥其候身熱神昏或吐乳瀉黃沫多啼無喜悅唇上生白珠子是也每三十二日必一變六十四日再變兼蒸或二十八日及三十日必變者亦無定期至二五日方歇歇後精神必有異於前也辨小兒生死脈小兒中風熱喘鳴肩息脈緩則生急則死小兒痢疾脈浮大而腹痛者必死乳子病熱脈懸小手足溫則生寒則死小兒困汗出如珠著身不流者死小兒有病胸陷口唇乾目直視口中氣冷頭低臥不舉身手足垂軟身體強直掌中冷皆不可治脈亂者同小兒死證一十五候歌眼上赤脈下貫瞳人囟門腫起兼及作坑鼻乾黑燥肚大青筋目多直視睹不轉睛指甲黑色忽作鴉聲虛舌出口齧齒咬人魚口氣急啼不作聲蛔蟲既出均是死形看小兒虎口訣凡嬰孩生下一月至三歲當看虎口內脈兩邊脈有黃青紅紫黑五色除黃色為平和黑色為危急外青紅紫色可以察病青色受胎氣不全主驚積多搐掣指脈深青臥不寧微青脈痛糞多青青兼黑色盤腸吊發搐牽抽不暫停紅色驚入脾竅孩兒指脈深紅色發熱驚時自強直微紅下痢腹中疼吐瀉脾虛多不食紫色胎驚熱指中紋生紫色深驚時哭泣又呻吟微中紫色腸中痛吐瀉紋彎中惡心聽聲驗病訣聲者臟之音也肝應角其聲悲而和雅心應徵其聲雄而清明脾應宮其聲慢而緩大肺應商其聲促而清冷腎應羽其聲沉而細長聲悲是肝病一云聲呼聲雄是心病一云聲笑聲慢是脾病一云聲歌聲促是肺病一云聲哭聲沉是腎病一云聲呻以上臟病也聲清是膽病聲短是小腸病聲速是胃病聲長是大腸病聲微是膀胱病以上腑病也聲悲慢是肝脾相剋病聲速微細是胃膀胱相剋病聲細長是實聲輕是虛聲沉粗是風聲短細是氣聲粗是熱聲短遲是瀉聲長是病痢聲實是秘澀察五臟色知生死訣色者氣之華也肝病面青如翠羽或如蒼玉之澤者生如藍如地苔如草滋如枯草眼眶陷入者三日死面腫蒼黑舌卷而青四肢乏力兩眼如盲泣出不止八日死此肝臟絕也一雲中熱嗌乾善溺心煩舌卷卵上縮病人筋絕爪甲枯黑八日死面青目黃半日死一云五日死手足甲青頻呼罵者是筋絕九日死項筋舒展者死目無精光齒斷黑者死病人目睘絕系不能正膽絕也心病面赤如雞冠之色或如帛裹朱者生如代赭如衃血如瘀血一日死面黧肩息直視掌腫沒紋狂言身熱一日死此心臟絕也面赤目青者立死病人脈絕口張唇青毛髮乾豎五日死久病人兩頰顴赤口張氣直者死脾病面黃如蟹腹如羅裹雄黃者生如枳實如黃土色四肢腫起者九日死面浮黃臍膚腫滿泄瀉下痢肌澀唇反十二日死此脾臟絕也人中滿背青三日死唇青體冷遺尿不食四日死肩息直視唇焦者死體腫溺赤頻數不止者是肉絕六日死口目動作善驚妄言胃絕也目眥黃者病欲愈有胃氣也面如土色不食者四日死胃氣絕也肺病面白如豕膏或如白璧之澤者生如鹽如堊如枯骨者死口鼻氣出唇反無紋色黑似煤皮毛乾焦爪甲枯折者三日死此肺臟絕也面白毛折者死髮直如麻者半日死腎病面黑如烏羽或如黑漆而澤者生如炲如炭煤耳色萎黃兼卒呻吟四日死面黑齒痛兩目如盲自汗如水腰折沉重皮肉濡結發無潤澤者四日死此腎臟絕也病人骨絕齒如熟豆一日死耳目口鼻黑色起者死面黑目白者八日死面腫蒼黑者死脊痛腰重不能反覆者死面黑齒長而垢腹脹閉不得息善噫善嘔皮毛焦腎臟絕也大凡黃赤為熱白黑為寒青黑為痛病人腳趺腫起身體沉重卒失屎溺妄語錯亂忽作屍臭陰囊皆腫口反張爪甲黑兩目直視皆死證也頭傾視深精氣將奪謂項不能舉天柱骨折也轉腰不能腎氣已憊背曲肩隨腑氣已壞其音嘶者是氣不朝肺聲散者肺損也凡見此證不出三歲考味知病法好食酸則肝病好食苦則心病好食甘則脾病好食辛則肺病好食鹹則腎病好食熱則內寒好食冷則內熱原夢肝氣盛則夢怒心氣盛則夢喜脾氣盛則夢歌樂肺氣盛則夢哭腎氣盛則夢恐懼上虛則夢墮下虛則夢飛陽盛則夢大火而燔灼陰盛則夢大水而恐懼陰陽俱虛則夢相殺毀傷甚飽則夢予甚飢則夢取短蟲多則夢聚眾長蟲多則夢相擊毀傷王叔和脈訣余於其滑實弦緊四脈有疑焉滑弦之脈略論於前而實緊之脈未盡釋張仲景以浮緊為傷寒用之常驗矣獨實脈或以為熱或以為寒余謂實不當以寒言姑並錄之以俟明哲者
