body:
  text: 卷上十二經總括左手寸口手少陰心臟部為帝王一云君主之官屬朱雀南方丙丁君火主血脈及暑外候在舌其神神其誌喜其聲笑一云言其色赤其臭焦其味苦其液汗其音徵其卦離其數七此成數也其生數二其變動為憂其腑手太陽小腸其積伏梁如臂連臍左手關上足厥陰肝臟部為尚書一云將軍之官屬青龍東方甲乙木主藏血及筋爪風外候在目其神魂其志怒其聲呼其色青其臭臊其味酸其液泣其音角其卦震其數八此成數也其生數三其變動為握其腑足少陽膽其積肥氣若杯覆左脅邊左手尺內足少陰腎臟部為列女一云作強之官屬玄武北方壬癸水主藏精及骨髓齒水濕寒外候在耳其神志其志恐其聲呻其色黑其臭腐其味鹹其液唾其音羽其卦坎其數六此成數也其生數一其變動為慄其腑足太陽膀胱其支脈曰巨陽其積賁豚在臍下右手寸口手太陰肺臟部為將軍一云相傅之官屬白虎西方庚辛金主藏氣及皮毛燥一云寒外候在鼻其神魄其志憂其聲哭其色白其臭腥其味辛其液涕其音商其卦兌其數九此成數也其生數四其變動為咳其腑手陽明大腸其積息賁在右脅邊右手關上足太陰脾臟部為大夫一云倉廩之官屬勾陳中央戊己土主藏智肌肉勞倦濕外候在唇口其神意其志思其聲歌其色黃其臭香其味甘其液涎其音宮其卦坤其數五此生數也其變動為噦其腑足陽明胃其積痞氣在胃脘覆大如盤右手尺內手厥陰命門部屬相火一名神門一名手心主一名心包絡主藏心與腎同氣男子以藏精女子以系胞其腑手少陽三焦上焦其卦乾中焦其卦艮下焦其卦巽診三部脈法寸部法天主上焦診自頭以下至心病也關部法人主中焦診自心以下至臍病也尺部法地主下焦診自臍以下至足病也三部九候三部者上中下即寸關尺也每部三候各自分天人地上部天以候頭角上部人以候耳目上部地以候口齒中部天以候肺中部人以候心中部地以候胸中下部天以候肝下部人以候脾胃下部地以候腎九候雖有數說不如此說易曉今亦難用姑存之王子亨云一位有三候浮取之屬陽沉取之屬陰中得之為胃氣故無胃氣則死左右三部六候左寸外以候心內以候膻中其穴在兩乳間左關外以候肝內以候膈中左尺外以候腎內以候腹中腹屬下焦右手尺中亦可候也右寸外以候肺內以候胸中三焦之所主也右關外以候脾內以候胃脘右尺外以候心主內以候腰四季脈名春弦謂端直如弓弦也夏洪一云鉤謂脈如鉤芒來疾去遲秋浮一云毛謂如鴻毛之輕舉也冬沉一云營一雲石謂其沉也診五臟四季常脈春肝脈微弦而長一云弦細而長一云弦長而軟一云濡弱而長夏心脈洪大而散一雲浮大而散一雲浮洪而駃一云洪而微實一雲浮大而洪長一云洪大而長呂廣云非是乃小腸脈也四季脾脈娜娜而緩一云軟大而緩一云沉而濡長三月六月九月十二月各旺一十八日秋肺脈浮澀而短一云微澀而短一云輕虛以浮冬腎脈沉滯而滑一云沉濡而短一云沉而緊實一云沉細一云沉實而滑一云沉濡而滑定四季六臟平脈春肝脈欲弦而長心脈欲弦而洪浮脾脈欲弦而緩肺脈欲弦而微浮腎脈欲弦而沉濡命門脈欲弦而滑夏心脈欲洪大而散脾脈欲洪而遲緩肺脈欲洪而浮澀腎脈欲洪而沉滑命門脈與腎同肝脈欲洪而弦長秋肺脈欲浮而短澀腎脈欲微而伏命門脈欲微而滑肝脈欲浮而弦細心脈欲浮而洪脾脈欲浮而微緩冬腎脈欲沉而滑命門脈與腎同肝脈欲沉而弦心脈欲沉而洪脾脈欲沉而緩肺脈欲沉而澀定四季相剋脈春得秋脈者死於庚辛日謂金之剋木也夏得冬脈者死於壬癸日謂水之剋火也四季得春脈者死於甲乙日謂木之剋土也秋得夏脈者死於丙丁日謂火之剋金也冬得四季脈者死於戊己日謂土之剋水也五臟相剋所不可勝者為賊邪其難治也信矣至於所可勝者為微邪雖不治而自愈王叔和脈賦云春得脾而不療冬見心而不治夏得肺而難救秋得肝亦何疑反以微邪為可畏者何耶及觀靈樞經云水動而火明火炎而土平土盛而金生金盛而水盈乃知叔和之說有所本試即土盛金生言之夫土氣既旺則生金以剋木使肝臟之脈弦而緩是本脈尚存脾或侵之此所謂微邪不足慮若本脈全無而獨見脾脈者斯足為害也餘臟可以類推診五臟賊邪脈東方角木春肝木木畏金遇肺金乘木大逆八月死南方徵火夏心火畏水遇腎水乘火大逆十一月死中央宮土脾土畏木遇肝木乘土大逆二月死西方商金秋肺金畏火遇心火乘金大逆五月死北方羽水冬腎水畏土遇脾土乘水大逆六月死此即前四季相剋脈也前言其所死之日此言其所死之月故兩存之診四時虛實脈歌春得冬脈只是虛謂春脈弦反得冬石脈是腎水為木之母從後來乘肝木之子為虛邪兼令補腎病自除母虛則補之若得夏脈緣心實得夏洪脈是心火為木之子從前來乘肝木之母為實邪還應瀉子自無虞子實則瀉之夏秋冬脈皆如是在前為實後為虛春中若得四季脈不治多應病自除四季緩脈是脾土為木之妻不勝於夫為微邪雖不治而病自愈下指輕重法凡診候安神靖氣男先診左手女先診右手將中指揣得關位卻以第一指著寸部令徹骨漸徐舉指關尺部皆然此先重而後輕也活人書云先浮按消息之次中按次重按此先輕而後重也亦得診五臟動脈法脈來五十動一止者五臟六腑受氣足其人無病脈來四十動一止者一臟無氣謂腎氣先盡也其人後四年春草生時死脈來三十動一止者二臟無氣其人後三年穀雨至時死脈來二十動一止者三臟無氣其人後二年桑椹赤時死脈來十動一止者四臟無氣其人後一年草枯時死脈來五動一止者五臟無氣其人後五日死王叔和云脈來四動一止八日死三動一止六七日死兩動一止三四日死別本云但此止者非結脈促脈之止也此是代脈之止也至於代脈非達人者難窺者乎診六腑平脈法左手寸口手太陽小腸脈洪大而緊一云洪大而長為受盛之官名受盛之府左手關上足少陽膽脈弦大而浮一云大而浮一云乍數乍疏乍短乍長一云乍大乍小乍短乍長其與祟脈無異何以區別然兩手三部皆然方為祟脈今獨左手關部如此則謂之膽脈可也為中正之官名清淨之府一雲中精之府相火膽與風木肝合脈急則為驚左手尺內足太陽膀胱脈洪滑而長為州都之官名津液之府寒水膀胱與君火腎合脈急則為瘕心脈居午謂之君火宜也今腎脈居子亦謂之君火何義命門脈為心主居亥謂之相火宜也今膽脈居寅亦謂之相火又何耶及觀內經天元紀大論篇鬼臾區曰子午之歲上見少陰巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之少陽之上相火主之而釋者謂午亥之歲為正化子巳之歲為對化由此言之則心腎皆可言君火以其熱氣主之也厥陰既主風氣而手厥陰命門不當以相火言少陽既主其相火則膽與三焦為相火明矣右手寸口手陽明大腸脈浮短而滑一云短而澀為傳道之官名傳道之府右手關上足陽明胃脈浮長而澀一雲浮大而短為倉廩之官名水穀之府燥金胃與濕土脾合右手尺內手少陽三焦脈洪散而急為決瀆之官名外府脈息大數人一呼一吸脈各行三寸此一息也一日一夜一萬三千五百息榮衛行陽二十五度行陰二十五度為一周也復會於手太陰診五臟脈訣輕手於皮膚得之者肺也至肌得之者心也至肉得之者脾也至筋得之者肝也至骨得之者腎也男女反脈男子陽脈常盛陰脈常弱女子陽脈常弱陰脈常盛男得女脈為不足病在內當作虛醫女得男脈為有餘病在外謂在四肢左得之病在左右得之病在右當作實醫男子生於寅寅為木女子生於申申為金故男脈在關上女脈在關下三陽從地生故男子尺脈沉也三陰從天生故女子尺脈浮也觀人形性脈法人長則脈長人短則脈短人肥則脈沉一云脈厚一云脈細而實人瘦則脈浮一云脈急一云脈大而長人壯脈欲大人弱脈欲小反者為逆形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死老人脈微微陽羸陰者平一云脈濡而緩婦人脈當軟弱於丈夫小兒四五歲脈實自駃呼吸八至一云幼人脈數而壯性急脈急性緩脈緩察平人損至脈法凡一呼一吸為一息一呼脈再至一吸脈再至是一息之間脈四至並五至不大不小不短不長是為平人之脈也一呼一吸脈不及四至者曰緩一雲氣虛其人少氣三至者曰遲一云損其人可治二至者曰敗一云寒其人難治延時而死一至者曰息其人雖行方當著床待時而死此為陰病之損脈也故曰陰病脈遲一呼一吸脈六至者曰數一云離絕為始得病七至者曰極一云無魂八至者曰脫一云奪精一云無魄九至者曰死十至者曰墓一云困沉細者困在夜浮大者困在晝十一十二至者曰死一云絕魄一云命傾沉細夜死浮大晝死此為陽病之至脈也故曰陽病脈數診暴病脈法脈來急大洪直者死細微者無害診祟脈法脈來乍大乍小乍短乍長為禍祟別本云右尺洪大為祟脈寸尺有脈關中無脈為鬼病診病內外法脈浮大者病在外沉細者病在內診癥病脈法左手脈橫癥在右右手脈橫癥在左脈頭大者臍上脈頭小者臍下診候約法浮為風為虛沉為濕為實遲為寒為冷數為熱為燥洪為驚為癇一云數為虛為熱滑為實為下又云風則脈浮寒則脈緊中暑則脈虛而滑中濕則脈細而澀活人書云脈沉緩為中濕脈細者非也傷於陰則脈沉傷於陽則脈浮辨雜病脈吐汗溫利可否法弦緊者可下弦遲者宜溫緊數者宜汗脈微者不可吐虛細者不可下沉微者不可汗人迎氣口脈人迎脈在左手關前一分其穴在結喉兩旁同身寸之一寸五分動脈應手者是也診之以候六淫浮則為風緊盛則傷於寒氣口脈在右手關前一分診之以候七情浮則為虛為氣緊盛則傷於食辨三因寒暑燥濕風熱謂之六淫屬外因喜怒憂思悲恐驚謂之七情屬內因疲極筋力盡神度量飲食飢飽叫呼走氣房室勞逸金瘡踒折虎狼毒蟲鬼疰客忤畏壓溺等為不內外因陳無擇云凡診須識人迎氣口以辨內外因其不與人迎氣口相應為不內外因所謂關前一分人命之主也定生死訣陽病得陰脈者死陰病得陽脈者生脈病人不病者死名曰行屍人病脈不病者生為內虛屍厥既有人病而脈不病者直是息數脈與相應者可治也難經云然人形病脈不病非有不病者也謂息數不應脈數也脈經云病人得健脈名曰臥屍脈訣云病人脈健不用治夫人病脈不病者安有是理當如難經之說謂息數不應脈數者是也人之初病脈非數則遲必此等脈可生若健脈則急大洪直與形證相反者斷不可治下指疏密法凡診視其臂長則疏下指臂短則密下指古人身長其臂亦長故寸部佔九分關尺部各佔一寸三部共二寸九分今人身短其臂亦短有三部共不及二寸者若依古法診之則頭指診在關部次指診在尺部第三指診在閒處如何知病之所在今但以高骨為準逐一指診指其部位不必拘九分一寸之說庶幾可也
