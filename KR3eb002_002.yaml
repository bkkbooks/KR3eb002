body:
  text: 卷中辨七表八里九道七死脈七表脈七表脈屬陽浮芤滑實弦緊洪也祕寶以洪大浮數緊動滑實為陽傷寒論以大浮數動滑為陽一浮脈指下尋之不足舉之有餘似水上浮物以手按之虛散舉之有力故名曰浮也浮為在表主風虛乏短氣左手寸口脈浮主傷風發熱頭痛目眩及風痰左手關上脈浮主胃虛腹脹小便難肝脈本微弦而長今見浮脈周氏云主胃虛腹脹乃是胃經受病何也黃帝云主小便難乃是膀胱經受病又何也豈肝脈從小腹上挾胃而然耶浮大而實主眼目昏痛溢關與寸口相應主目眩頭重筋疼浮洪盛大主筋脈緩弱身體無力浮大而長主風眩癲疾左手尺內脈浮膀胱受風熱主小便赤澀浮而緊主耳聾及淋閉浮而大為陽干陰溺則陰中痛浮而數主小便頻並熱淋右手寸口脈浮肺感風寒主咳嗽氣促鼻塞清涕冷汗自出背膊勞強夜臥不安浮本肺脈但全浮則為病如浮澀而短斯為平脈也浮而實主咽門乾燥傷損有瘡癰浮短為肺傷為諸氣浮滑為走刺浮緩為皮膚不仁風寒入肌肉浮緊為肺有水右手關上脈浮脾氣不足腹滿不飲食食不消化積熱在胃中浮滑而疾速者亦然浮緩不思飲食浮而實脾胃虛主消中口乾飲水多食亦飢浮大而澀為宿食滯氣浮滑為飲浮細而滑為傷飲浮而微則傷客熱邪風主病寒熱去來進退不定右手尺內脈浮大腸受風熱主大便祕澀客熱在下焦浮數主大便堅大腸雖肺腑居下焦寸關脈浮而疾名陽中之陽主頭痛尺寸俱浮主患氣俱浮而滑男子疝瘕婦人有孕或月閉不通浮滑疾緊為百合病趺陽脈浮虛者浮為風為虛風脈則指下浮有力虛脈則指下浮而無力二芤脈指下尋之兩頭即有中間全無其脈浮大而軟按之中央空兩邊實喻似指按芤草葉芤葉即蔥類中心空虛故名曰芤也主失血左手寸口脈芤主吐血微芤者衄血左手關上脈芤主腹內作聲有瘀血亦主吐血眼暗左手尺內脈芤主淋瀝小便赤或有血右手寸口脈芤主胸中積血瘀血右手關上脈芤主腹內暴痛腸胃內有癰積瘀血活人書云主大便血右手尺內脈芤主大腸血痢或下血三滑脈指下尋之三關如珠動按之即伏不進不退或云往來流利按如動珠子而有力替替然與數相似故名曰滑也主吐逆左手寸口脈滑心藏熱滑而實大心驚舌強左手關上脈滑肝藏熱上連頭目為患滑散為癱緩滑而浮散者有風左手尺內脈滑腎與膀胱俱熱主小便結澀淋瀝莖中痛尿色赤又滑為風多血少氣少氣則四肢困疲痠疼多血則疼痛小便赤滑而弦主腰腳痛滑而弱主陰中痛脈賦解義云男子尺部見滑主膀胱冷氣纏聚小腹急脹便漩利數兩脅脹滿直以滑脈主冷亦未可當如弦脈説右手寸口脈滑陽氣盛實主嘔逆滑而實肺臟大熱主毛髮乾焦胸膈壅滯聚氣為痰頭目昏重涕唾稠黏咽中乾燥疼痛或時咳嗽右手關上脈滑脾臟熱主口臭惡氣喘息粗大胃脘先受寒氣變為熱實飲食不下下則吐逆病脾風疝滑實為胃熱滑而大小不勻必吐為病進為泄利右手尺內脈滑下焦有實熱渴而引飲飲冷過度臍似冰冷腹鳴時痛或下痢婦人主血氣實經月不通然而尺脈滑者亦本形也脈賦解義云盡脈滑主胞絡極冷女經不調則以滑為陰脈也和緩為妊娠滑而浮大小腹痛滑而弱大便痛滑為鬼疰滑數為結熱滑為痰逆趺陽脈滑者胃氣實四實脈按之洪大牢強隱指愊愊然故名曰實也主病在內左手寸口脈實胸中熱甚及生寒熱實而大主頭面熱風所攻心中躁悶身上疼痛面色赤實大而滑主舌強心驚語話艱難左手關上脈實主腹中切痛實而浮大肝氣盛主眼目赤痛昏暗左手尺內脈實主小腹滿痛小便澀實而滑主淋瀝莖中痛尿色赤實而大膀胱熱主小便艱難不通實而緊主腰痛或本云實緊胃中有寒若不能食時時利者難治右手寸口脈實主上焦熱實而浮是熱乘肺臟咽門乾燥傷損有瘡癰及主氣寒喘咳右手關上脈實脾臟虛弱飲食減少熱氣蒸脾虛也反胃氣壅滯實而浮脾家熱主消中唇口乾燥饒飲水漿食多不飽四體勞倦陳無擇謂實而緊為胃寒然二脈雖屬陽實脈則主熱痛緊脈則主寒痛今二脈俱見謂之主胃寒恐非也右手尺內脈實主忽下痢此則熱痢黃帝脈經於關部之脈實腹滿寒疝下痢夫其陽脈如何主寒疝必傳之訛也今下痢移於尺部屬下焦也五弦脈徑急如張弓弦故名曰弦也脈經以為表脈則屬陽傷寒論以為陰脈賦解義亦云弦滑之脈雖屬於七表皆主於陰數説不同當如活人書説若弦而洪數者為陽弦疾而沉且微細者為陰主拘急又巢元方王子亨以弦為虛主拘急左手寸口脈弦主頭疼有心氣心胸中急痛及心懸如人大飢之狀主勞氣發作乏力多盜汗手足痠痛左手關上脈弦沉主患痃癖痃者懸也以懸於心下或左或右或中也癖者側也其氣在於臍脅之側或上下左右也弦而緊者脅下痛為惡寒為疝瘕為瘀血弦小者為寒癖左手尺內脈弦主小腹急滿痛弦而滑主腰腳痛右手寸口脈弦主皮毛枯稿右手關上脈弦主胃中寒有宿食及飲右手尺內脈弦主小腹中拘急下焦停滯水積弦數為勞瘧雙弦脅急痛弦長為積弦急中風熱急者緊也弦緊多主寒此言中風熱何也六緊脈按之實數似切繩狀來疾而有力故名曰緊也主痛左手寸口脈緊主頭痛緊而沉心中氣逆冷痛左手關上脈緊主心下苦滿熱及心腹痛筋脈拘急主風氣伏陽上衝化為狂病緊而實主患痃癖左手尺內脈緊主臍下及腰腳痛右手寸口脈緊而沉滑肺氣實主咳嗽右手關上脈緊主脾中痛脅肋下拘急欲吐不吐乾嘔氣逆沖昏悶盛緊者腹脹緊而滑者為宿食為蛔動為吐逆右手尺內脈緊主下焦疼痛緊而長過寸口者為疰病緊而急者遁尸緊而數者寒熱俱發下之乃愈尺寸俱緊而數其人中毒吐逆七洪脈極大在指下舉按滿指或云來大去長故名曰洪也主熱左手寸口脈洪主頭痛胸膈脹滿煩熱左手關上脈洪肝臟熱及四肢浮熱遍身疼痛手足本屬脾部今四肢浮熱乃見肝部則知關脈主中焦病故肝脾俱可候也左手尺內脈洪膀胱熱主小便赤澀而腳痠疼右手寸口脈洪主毛髮乾焦涕唾稠黏咽喉乾燥洪而緊為喘急右手關上脈洪胃中積熱主翻胃大吐逆口乾洪而緊為脹右手尺內脈洪主大腸不通燥糞結澀洪大為傷寒熱病洪實為癲洪緊為癰疽洪浮為陽邪來見為祟洪大緊急病在外苦頭痛發癰腫別本云三部俱洪三焦俱熱八里脈八里脈屬陰微沉緩澀遲伏濡弱也祕寶以微沉緩澀遲伏軟弱為陰傷寒論以沉澀弱弦微為陰一微脈指下尋之若有若無極細而浮軟往來如秋風吹毛而無力故名曰微也主氣痞左手寸口脈微心臟虛多憂惕寒熱更作寒氣上侵心胸痞結陽不足惡寒虛勞盜汗微而浮弱心中寒左手關上脈微心下氣滿鬱結目暗生花四肢拘急左手尺內脈微主敗血不止男子溺血女子崩血久為白帶右手寸口脈微上焦寒氣痞結微弱為少氣中寒右手關上脈微胃中寒氣脹滿飲食不化厥逆拘急右手尺內脈微小腹寒氣積聚肚痛臍中聲吼而瀉尺寸俱微男子五勞婦人絶産微浮秋吉冬病二沉脈舉之不足按之有餘重按乃得故名曰沉也沉為在裡主冷氣水病一云主濕冷洞泄右手寸口脈沉胸中氣短有寒飲及胸脅痛有水氣沉而緊主心中氣逆冷沉而細名陽中之陰苦悲傷不樂聞人聲少氣自汗兩臂不舉左手關上脈沉主心下痛氣短促兩脅滿手足時冷沉而弦者主痃癖腹內痛左手尺內脈沉主冷氣腰背痛小便稠數色如米泔沉而細名曰陰中之陰苦兩脛痠疼不能久立陰氣衰少小便餘瀝陰下濕癢沉本腎脈但全沉則為病如沉濡而滑則為平脈也右手寸口脈沉緊而滑主咳嗽沉細而滑主骨蒸病寒熱交作皮毛乾澀沉細為少氣臂不能舉右手關上脈沉主心下滿苦吞酸沉緊為懸飲沉在下則為實右手尺內脈沉主患水病腰腳沉重而弱沉而緊主腰腳寒痛沉而細者苦㽱痛下重痢沉滑者有寸白蟲此脾蟲見於此為下重背膂痛為風水腎主水因何見此蓋命門與腎同氣故也沉弱為寒熱沉遲為痼冷沉重為傷暑發熱沉緊為上熱下冷沉重而中散者因寒食成癥沉重而直前絶者有瘀血在腹沉重不至寸徘徊絶者為遁尸三緩脈指下尋之浮大而軟去來微遲故名曰緩也主風結左手寸口脈緩主脊項筋緊急搐痛肝主筋今見心部何耶蓋項筋屬上焦故也左手關上脈緩主眩暈腹內氣結痛如筋緊之狀左手尺內脈緩腎虛耳鳴有冷結氣夢為鬼隨小便難有餘瀝此冷淋也右手寸口脈緩主氣促不安皮膚頑痹不仁為氣不足右手關上脈緩主風寒入肌肉胃虛不能食緩而滑胃中熱脾之本脈軟大而緩若全緩則為病脈右手尺內脈緩下焦寒腳弱下腫風氣祕滯緩而滑為熱中緩而遲為虛寒相搏食冷則咽痛四澀脈細而遲往來難時一止輕手乃得重手不得按之數浮如輕刀刮竹皮或云三五不調如雨沾沙故名曰澀也即黃帝澀脈王冰云陽氣有餘則血少故脈澀主身熱無汗此言未足信其實陰虛之脈也主血氣不足而痹左手寸口脈澀主榮衛不足無心力不能多言主中霧露冷氣亡汗心痛左手關上脈澀肝臟虛主血散失肋脹脅滿兩脅下有骨處為肋肋者勒也以勒五氣肋下無骨處為脅通身疼痛女子有孕胎痛無孕敗血謂崩中漏下或血瘕月信不調之候是也左手尺內脈澀腎臟虛亂夢涉水小便數精頻漏及患疝氣小腸氣右手寸口脈澀上焦冷陽虛衛氣不足痞澀氣促無力背膊刺痛右手關上脈澀脾氣不足而痛不思飲食胃冷而嘔右手尺內脈澀主小腹冷作雷鳴及下痢足脛逆冷澀細而緊者為寒濕痹五遲脈一息三至去來極遲重手乃得隱隱遲慢故名曰遲也遲為腎虛之脈主虛惡寒氣塞滿脹左手寸口脈遲主心上寒左手關上脈遲主腹中冷痛此臍以上痛也左手尺內脈遲主腎虛不安小便白濁身寒體顫夜夢驚悸右手寸口脈遲主上焦有寒右手關上脈遲主中焦有寒胃冷不欲食吞酸吐水遲而澀胃中寒有癥結右手尺內脈遲主下焦有寒腰腳沉重關尺遲名曰陰中之陰其人苦悲愁不樂少氣力而多汗六伏脈按之著骨乃得不出其位舉之全無故名曰伏也主物聚左手寸口脈伏主胸中有聚物左手關上脈伏主陰病常欲瞑目左手尺內脈伏主小腹痛寒疝瘕右手寸口脈伏主胸中氣滯有痰噎塞不通右手關上脈伏主中脘有滯物及腸澼水氣溏泄右手尺內脈伏主宿食不消伏而芤大便去血七濡脈按之似有舉之全無一云按之似無舉之全無力極軟而浮細一云按之不見輕手乃得不能隱指故名曰濡也即黃帝所謂軟脈集韻濡軟二字同呼同用主惡寒左手寸口脈濡主虛損多汗五心煩熱左手關上脈濡主體重少力虛弱精神離散左手尺內脈濡主腎虛損骨髓不溫肉不著骨齒長而枯發無潤澤腦轉耳鳴濡而弱為小便難此冷淋也論大小便雖在尺部當參寸部大小腸脈方準右手寸口脈濡主元氣敗少力右手關上脈濡脾氣弱苦虛冷重下痢右手尺內脈濡主發熱惡寒下元冷極濡而弱為內熱外冷自汗此虛熱盜汗也八弱脈指下尋之如爛綿輕手乃得重手稍無極軟而弱細按之欲絶指下故名曰弱也主虛而筋痿及風氣左手寸口脈弱主心中悸陽氣虛汗自出左手關上脈弱主筋痿弱微而浮散主目暗生花婦人産後客風面腫弱而虛為風熱此風虛而客熱左手尺內脈弱主骨肉痠痛右手寸口脈弱陽道虛損衛氣不足弱微而浮散主氣滯右手關上脈弱胃氣虛有客熱不可大攻恐熱去寒起也右手尺內脈弱下焦冷無陽氣古人於左右尺部診大小便往往少驗然大便出於大腸大腸乃肺之腑當於右手寸口脈參之小便出於小腸小腸乃心之腑當於左手寸口脈參之九道脈九道脈屬陽者二屬陰者七一長脈屬陽指下尋之往來通度三關如持竿狀舉之有餘曰長過於本位亦曰長黃帝脈經無長脈有散脈云大為散乃陽盛陰虛之脈焉知散非長也主渾身壯熱坐臥不安是陽毒邪熱之氣居於三焦患在於表宜徐徐發表出汗而愈散脈按之滿指六腑氣絶於外則手足寒上氣五臟氣絶於內則下利不禁甚者不仁其脈皆散散則不聚病亦危矣二促脈屬陽陽盛則促按之極數時止復來曰促主積聚氣痞四肢困劣精神交亂憂思所成若診之向前而來漸出關上並居寸口疾數則病血熱發成斑點忽然退減則生漸加即死然其促有五曰氣曰血曰飲曰食曰痰以五者留滯不行則止促止促非惡脈也三短脈屬陰指下尋之往來極短曰短不及本位亦曰短主四體惡寒陰中伏陽三焦氣壅宿食不消宜大瀉通利腸胃而安短而滑者病酒短而數者心痛煩躁四虛脈屬陰按之不足遲大而軟曰虛主氣血虛生煩熱少力多驚心中恍惚健忘宜補益三焦即安虛為腳弱為食不化為傷暑小兒主驚風五結脈屬陰陰盛則結脈往來遲緩時一止復來曰結主胸滿煩躁積氣生於脾臟之旁大腸作陳疼痛宜宣瀉於三焦而愈結為痰為飲為血為積為氣一雲氣塞脈緩則為結活人書云陰盛發躁六牢脈屬陰按之實強有似沉狀一云沉伏實大如按鼓皮曰牢即黃帝所謂革脈也主骨肉疼痛皮膚紅腫胸中氣壅喘息短促此心絶之脈也尺脈牢男子主陰疝偏墜女人主血崩瘕聚胞腎虛冷使然尺寸脈牢而長關中無為陰乾陽苦兩脛重小腹引腰痛革為滿為急為虛寒相搏婦人半産漏下男子亡血失精七動脈屬陰指下按之無頭尾大如豆沉沉微動不來不往曰動主四體虛勞疼痛崩中血利為驚恐為攣為泄衆經悉皆以動為陽脈此脈居關上陰陽相搏為動陽動則汗出陰動則發熱八細脈屬陰指下尋之細如絲線來往極微小曰細主脛痠髓冷乏力損精囊下濕癢小便遺瀝細為氣血俱虛為病在內為積為傷濕為後泄為寒為神勞為憂傷過度為腹滿細而緊為寒疝為癥瘕積聚為刺痛細而滑為僵仆為發熱為嘔吐九代脈屬陰指下尋之往來緩動而中止不能自還因而復動或云臟絶中止餘臟代動曰代主形容羸瘦口不能言老得之生少得之死婦人亦然有孕約三月餘日也代為五臟氣絶之脈上前七表八里九道共二十四脈按諸家脈書皆二十四脈互有少異但無濡牢長短四脈卻有數革軟散四脈若取諸家脈經觀之乃有數革軟散大五脈革軟散脈已見於前數脈屬陽指下尋之去來急速一息六至曰數主熱數為虛為煩渴為煩滿寸口脈數主頭痛關上脈數脾熱口臭生瘡胃熱嘔吐尺內脈數不惡寒小便黃赤言虛當如浮脈説大脈屬陽指下往來滿大主熱大為病進寸口脈壯大尺中無此為陽干陰若腰背痛陰中傷足脛寒大而堅疾主癲病大脈即洪脈此陽盛之脈如何主癲經云重陽者狂重陰者癲謂主狂病七死脈一彈石脈在筋肉皮按舉皆劈劈急曰彈石是肺絶死脈也彈石脈者蕭處厚謂肺絶之脈此説既未穩吳仲廣又推廣之以為象西方金令肝元絶其説尤穿鑿當以為腎絶之脈可也石乃腎之本脈合沉濡而滑今其臟脈現如彈石劈劈然湊指殊無息數其死無疑矣二解索脈在筋肉上動數而隨散亂無復次第曰解索是五臟絶死脈也王叔和云解索散亂而無緒吳仲廣云解索脈者其形見於兩尺脈來指下散而不聚若分於兩畔更無息數是精髓已耗將死之候也三雀啄脈在筋肉來而數急曰雀啄是心絶死脈也王叔和云雀啄頓木而又住吳仲廣云雀啄者木脈也主脾經穀氣已絶胃氣無所榮養其脈來指下連連湊指數急殊無息數但有進而無退頓絶自去良久準前又來宛如雞踐食之貌但數日之壽也據此所云乃脾絶之脈蕭處厚謂之心絶何耶王叔和云雀啄頓木而又住此雀乃啄木兒也吳仲廣因其頓木之説遂認為木脈木脈者肝脈也其説未達當以脾絶為是四屋漏脈在筋按之止時起而不相連曰屋漏是心肺絶死脈也王叔和云屋漏將絶而復起吳仲廣云屋漏脈者主胃經已絶穀氣空虛其脈來指下按之極慢二十息之間或來一至若屋漏之水滴於地上而四畔濺起之貌立死之候也據此云乃胃絶之脈何蕭處厚謂心肺絶脈耶五蝦遊脈在皮毛浮而再起尋還退沒不知所在起遲而去速曰蝦遊是脾胃絶死脈也王叔和云蝦遊冉冉而進退難尋吳仲廣云蝦遊之脈其來指下若蝦遊於水面泛泛而不動瞥然驚掉而去將手欲趨杳然不見須臾於指下又來良久準前復去又如蝦蟆入水之形瞥然而上倏然而去此是神魂已去行尸之候立死也六魚翔脈在皮肉上如魚不行而但掉尾動頭身搖而久住曰魚翔是腎絶死脈也王叔和云魚躍澄澄而遲疑掉尾吳仲廣云魚翔之脈主腎與命門皆絶衛氣與榮血兩亡其脈來指下尋之即有泛泛高虛前定而後動殊無息數宛如魚遊於水面頭不動而尾緩搖之貌故曰魚翔也又曰亡陽之候死矣旦占夕死夕占旦死日中占夜半死夜半占日中死七釜沸脈在皮肉上湧湧如羹上肥曰釜沸是死脈也診七表相承病法浮芤相傳中風衄血浮滑相傳中風吐逆浮實相傳中風下利浮弦相傳中風拘急浮緊相傳中風體痛浮洪相傳中風發熱
